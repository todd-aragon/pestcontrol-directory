name: deploy

# Auto-deploy to Vercel on every push to main (replaces the Vercel GitHub App).
# The scrape/content workflows commit fresh data to main, which fires this and
# pushes the new DB live — fully hands-off. Uses repo secrets VERCEL_TOKEN,
# VERCEL_ORG_ID, VERCEL_PROJECT_ID.

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual test runs

# only one deploy at a time; newest push wins
concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN not set — skipping deploy."; exit 0
          fi
          npm i -g vercel@latest
          T="${{ secrets.VERCEL_TOKEN }}"
          if ! vercel pull --yes --environment=production --token="$T"; then
            echo "::warning::Vercel token rejected — set a long-lived token from vercel.com/account/tokens as the VERCEL_TOKEN secret. Skipping deploy."
            exit 0
          fi
          vercel deploy --prod --yes --token="$T" \
            || echo "::warning::Vercel deploy failed; check VERCEL_TOKEN."
